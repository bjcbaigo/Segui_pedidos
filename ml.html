<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHEMES · Monitor ML</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:    #2596be;
    --blue-lt: #e8f4f8;
    --green:   #10b981;
    --amber:   #f59e0b;
    --red:     #ef4444;
    --gray:    #94a3b8;
    --bg:      #f1f5f9;
    --card:    #ffffff;
    --border:  #e2e8f0;
    --text:    #0d2233;
    --text2:   #64748b;
    --radius:  10px;
    --shadow:  0 1px 4px rgba(0,0,0,.08);
  }
  [data-theme="dark"] {
    --bg:     #0f172a;
    --card:   #1e293b;
    --border: #334155;
    --text:   #f1f5f9;
    --text2:  #94a3b8;
    --blue-lt:#1e3a4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* TOPBAR */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar img { height: 32px; }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
  .topbar-title span { color: var(--blue); }
  .btn-icon {
    background: none; border: 1px solid var(--border);
    border-radius: 7px; padding: 5px 10px; cursor: pointer;
    color: var(--text2); font-size: 13px; font-family: inherit;
    display: flex; align-items: center; gap: 5px;
    transition: all .15s;
  }
  .btn-icon:hover { background: var(--blue-lt); border-color: var(--blue); color: var(--blue); }
  .nav-link {
    font-size: 13px; color: var(--text2); text-decoration: none;
    padding: 5px 10px; border-radius: 7px; border: 1px solid transparent;
    transition: all .15s;
  }
  .nav-link:hover { background: var(--blue-lt); color: var(--blue); border-color: var(--blue); }

  /* MAIN */
  .main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

  /* RESUMEN */
  .resumen {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .res-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
  }
  .res-card .valor {
    font-size: 28px; font-weight: 700; line-height: 1;
    margin-bottom: 4px;
  }
  .res-card .label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .res-card.rojo   .valor { color: var(--red); }
  .res-card.ambar  .valor { color: var(--amber); }
  .res-card.verde  .valor { color: var(--green); }
  .res-card.total  .valor { color: var(--blue); }

  /* CONTROLES */
  .controles {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap; margin-bottom: 14px;
  }
  .controles input[type=text] {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 7px; padding: 7px 12px; font-size: 13px;
    font-family: inherit; color: var(--text); width: 280px;
    outline: none; transition: border-color .15s;
  }
  .controles input[type=text]:focus { border-color: var(--blue); }
  .filtro-btn {
    padding: 7px 14px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--card); cursor: pointer; font-size: 12px;
    font-family: inherit; color: var(--text2); font-weight: 500;
    transition: all .15s;
  }
  .filtro-btn:hover  { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }
  .filtro-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .filtro-btn.rojo.active   { background: var(--red);   border-color: var(--red); }
  .filtro-btn.ambar.active  { background: var(--amber); border-color: var(--amber); color: #fff; }
  .filtro-btn.verde.active  { background: var(--green); border-color: var(--green); }
  .info-count { font-size: 12px; color: var(--text2); margin-left: auto; }
  .ts { font-size: 11px; color: var(--text2); }

  /* TABLA */
  .tabla-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .tabla-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .tabla-head-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .tabla-head-title svg { color: var(--blue); }

  table { width: 100%; border-collapse: collapse; }
  th {
    padding: 10px 12px; text-align: left;
    font-size: 11px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: .05em;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 56px;
    white-space: nowrap;
  }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--blue-lt); }
  .desc-cell { max-width: 320px; }
  .desc-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

  .cod-badge {
    font-family: monospace; font-size: 11px;
    background: var(--blue-lt); color: var(--blue);
    padding: 2px 6px; border-radius: 4px;
  }
  .mla-link {
    font-family: monospace; font-size: 11px; color: var(--blue);
    text-decoration: none;
  }
  .mla-link:hover { text-decoration: underline; }

  /* SEMÁFORO */
  .sem {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .sem-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .sem.VERDE   { background: #d1fae5; color: #065f46; }
  .sem.VERDE   .sem-dot { background: var(--green); }
  .sem.AMARILLO{ background: #fef3c7; color: #92400e; }
  .sem.AMARILLO .sem-dot { background: var(--amber); animation: pulse-amber 1.5s infinite; }
  .sem.ROJO    { background: #fee2e2; color: #991b1b; }
  .sem.ROJO    .sem-dot { background: var(--red); animation: pulse-red 1.2s infinite; }
  .sem.GRIS    { background: #f1f5f9; color: var(--text2); }
  .sem.GRIS    .sem-dot { background: var(--gray); }

  @keyframes pulse-amber {
    0%,100% { opacity: 1; } 50% { opacity: .4; }
  }
  @keyframes pulse-red {
    0%,100% { opacity: 1; transform: scale(1); }
    50%     { opacity: .5; transform: scale(1.3); }
  }

  /* STOCK */
  .stock-ok   { color: var(--green); font-weight: 600; }
  .stock-warn { color: var(--amber); font-weight: 600; }
  .stock-zero { color: var(--red);   font-weight: 600; }

  /* ESTADO TEXTO */
  .estado-txt { font-size: 12px; color: var(--text2); }

  /* LOADING / ERROR */
  .loading, .error {
    padding: 48px; text-align: center; color: var(--text2);
    font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FOOTER */
  .footer {
    text-align: center; padding: 20px;
    font-size: 11px; color: var(--text2);
  }

  @media (max-width: 768px) {
    .main { padding: 12px; }
    .topbar { padding: 0 12px; }
    .controles input[type=text] { width: 100%; }
    th, td { padding: 8px 8px; }
    .desc-cell { max-width: 180px; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <img src="https://bjcbaigo.github.io/Segui_pedidos/IsolologoCH.png" alt="CHEMES">
  <div class="topbar-title">CHEMES · <span>Monitor Publicaciones ML</span></div>
  <a href="https://bjcbaigo.github.io/Segui_pedidos/" class="nav-link">📦 Pedidos</a>
  <button class="btn-icon" onclick="toggleTheme()">🌙</button>
  <button class="btn-icon" onclick="cargar()">↺ Actualizar</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- RESUMEN -->
  <div class="resumen" id="resumen">
    <div class="res-card total"><div class="valor" id="cnt-total">—</div><div class="label">Total publicaciones</div></div>
    <div class="res-card rojo"><div class="valor" id="cnt-rojo">—</div><div class="label">🔴 Pausadas / Inactivas</div></div>
    <div class="res-card ambar"><div class="valor" id="cnt-ambar">—</div><div class="label">🟡 Requieren atención</div></div>
    <div class="res-card verde"><div class="valor" id="cnt-verde">—</div><div class="label">🟢 Activas OK</div></div>
  </div>

  <!-- CONTROLES -->
  <div class="controles">
    <input type="text" id="buscar" placeholder="Buscar por descripción, código, SKU..." oninput="filtrar()">
    <button class="filtro-btn active" data-sem="TODOS" onclick="setSem(this)">Todos</button>
    <button class="filtro-btn rojo"  data-sem="ROJO"  onclick="setSem(this)">🔴 Pausadas</button>
    <button class="filtro-btn ambar" data-sem="AMARILLO" onclick="setSem(this)">🟡 Atención</button>
    <button class="filtro-btn verde" data-sem="VERDE" onclick="setSem(this)">🟢 Activas OK</button>
    <span class="info-count" id="info-count"></span>
    <span class="ts" id="ts-label"></span>
  </div>

  <!-- TABLA -->
  <div class="tabla-wrap">
    <div class="tabla-head">
      <div class="tabla-head-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Publicaciones MercadoLibre — CHEMESCASACENTRAL
      </div>
    </div>
    <div id="tabla-body">
      <div class="loading"><div class="spinner"></div>Cargando publicaciones...</div>
    </div>
  </div>

</div>

<div class="footer">CHEMES · Monitor ML · Datos actualizados cada hora desde Tango Nexo</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw8Hr6JScCCAoW9jinGeq_m7uUYtpF_VIx3FNI57qaxoZoCz5TjFVZ0uZTpOfPwbLo/exec?tipo=ml';

let datos    = [];
let semActivo = 'TODOS';

// ── CARGA ─────────────────────────────────────────────────────────────────────
async function cargar() {
  document.getElementById('tabla-body').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando publicaciones...</div>';
  try {
    const r   = await fetch(GAS_URL);
    const json = await r.json();
    if (!json.ok) throw new Error(json.error || 'Error en GAS');
    datos = json.data;
    actualizarResumen();
    filtrar();
    const ts = new Date(json.ts);
    document.getElementById('ts-label').textContent =
      'Actualizado: ' + ts.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  } catch(e) {
    document.getElementById('tabla-body').innerHTML =
      `<div class="error">⚠️ Error al cargar datos.<br><small>${e.message}</small></div>`;
  }
}

// ── RESUMEN ───────────────────────────────────────────────────────────────────
function actualizarResumen() {
  const total  = datos.length;
  const rojo   = datos.filter(d => d.SEMAFORO === 'ROJO').length;
  const ambar  = datos.filter(d => d.SEMAFORO === 'AMARILLO').length;
  const verde  = datos.filter(d => d.SEMAFORO === 'VERDE').length;
  document.getElementById('cnt-total').textContent = total;
  document.getElementById('cnt-rojo').textContent  = rojo;
  document.getElementById('cnt-ambar').textContent = ambar;
  document.getElementById('cnt-verde').textContent = verde;
}

// ── FILTROS ───────────────────────────────────────────────────────────────────
function setSem(btn) {
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  semActivo = btn.dataset.sem;
  filtrar();
}

function filtrar() {
  const q = (document.getElementById('buscar').value || '').toLowerCase();
  const filtrados = datos.filter(d => {
    const semOk  = semActivo === 'TODOS' || d.SEMAFORO === semActivo;
    const textoOk = !q ||
      (d.DESCRIPCION_ARTICULO_TIENDA || '').toLowerCase().includes(q) ||
      (d.COD_STA11 || '').toLowerCase().includes(q) ||
      (d.SKU || '').toLowerCase().includes(q) ||
      (d.CODIGO_ARTICULO_TIENDA || '').toLowerCase().includes(q);
    return semOk && textoOk;
  });

  document.getElementById('info-count').textContent = `${filtrados.length} publicaciones`;
  renderTabla(filtrados);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderTabla(rows) {
  if (!rows.length) {
    document.getElementById('tabla-body').innerHTML =
      '<div class="loading">Sin publicaciones para los filtros seleccionados.</div>';
    return;
  }

  const html = `
  <table>
    <thead>
      <tr>
        <th>Estado</th>
        <th>Código</th>
        <th>Descripción</th>
        <th>MLA</th>
        <th>Stock</th>
        <th>Stock seg.</th>
        <th>Estado Nexo</th>
      </tr>
    </thead>
    <tbody>
      ${rows.map(d => {
        const stock   = parseInt(d.CANTIDAD_DISPONIBLE) || 0;
        const seg     = parseInt(d.STOCK_SEGURIDAD) || 0;
        const stockCls = stock === 0 ? 'stock-zero' : (stock <= seg ? 'stock-warn' : 'stock-ok');
        const mlaUrl  = `https://www.mercadolibre.com.ar/p/${d.CODIGO_ARTICULO_TIENDA}`;
        return `
        <tr>
          <td><span class="sem ${d.SEMAFORO}"><span class="sem-dot"></span>${semLabel(d.SEMAFORO)}</span></td>
          <td><span class="cod-badge">${d.COD_STA11 || '—'}</span></td>
          <td class="desc-cell"><span class="desc-text" title="${esc(d.DESCRIPCION_ARTICULO_TIENDA)}">${esc(d.DESCRIPCION_ARTICULO_TIENDA) || '—'}</span></td>
          <td><a class="mla-link" href="${mlaUrl}" target="_blank">${d.CODIGO_ARTICULO_TIENDA || '—'}</a></td>
          <td class="${stockCls}">${stock}</td>
          <td>${seg > 0 ? seg : '—'}</td>
          <td class="estado-txt">${d.ESTADO || '—'}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;

  document.getElementById('tabla-body').innerHTML = html;
}

function semLabel(s) {
  const m = { VERDE: 'ACTIVO', AMARILLO: 'ATENCIÓN', ROJO: 'PAUSADO', GRIS: 'INACTIVO' };
  return m[s] || s;
}
function esc(t) {
  return (t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── TEMA ──────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const d = document.documentElement;
  const dark = d.getAttribute('data-theme') === 'dark';
  d.setAttribute('data-theme', dark ? 'light' : 'dark');
  localStorage.setItem('chemes-theme', dark ? 'light' : 'dark');
}
(function() {
  const t = localStorage.getItem('chemes-theme');
  if (t) document.documentElement.setAttribute('data-theme', t);
})();

cargar();
</script>
</body>
</html>
